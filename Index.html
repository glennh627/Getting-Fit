// ── Toasts ──
function PtsToast({pts,onDone}){
const [v,setV]=useState(true);
useEffect(()=>{const t=setTimeout(()=>{setV(false);setTimeout(onDone,300);},1500);return()=>clearTimeout(t);},[]);
return <div style={{position:“fixed”,top:80,left:“50%”,transform:“translateX(-50%)”,opacity:v?1:0,transition:“opacity 0.3s”,background:”#fff”,borderRadius:20,padding:“10px 22px”,boxShadow:“0 6px 22px rgba(0,0,0,0.13)”,zIndex:999,pointerEvents:“none”}}><span style={{fontSize:20,fontWeight:“bold”,color:”#F5A623”}}>+{pts} pts ⭐</span></div>;
}
function AwardToast({award,onDone}){
const [v,setV]=useState(true);
useEffect(()=>{const t=setTimeout(()=>{setV(false);setTimeout(onDone,400);},3000);return()=>clearTimeout(t);},[]);
return <div style={{position:“fixed”,bottom:90,left:“50%”,transform:“translateX(-50%)”,opacity:v?1:0,transition:“opacity 0.4s”,background:“linear-gradient(135deg,#1a1a2e,#2d2d44)”,borderRadius:16,padding:“14px 20px”,boxShadow:“0 8px 28px rgba(0,0,0,0.3)”,zIndex:999,textAlign:“center”,minWidth:220,pointerEvents:“none”}}><div style={{fontSize:28}}>{award.icon}</div><div style={{color:”#F5A623”,fontWeight:“bold”,fontSize:12,marginTop:3}}>Award Unlocked!</div><div style={{color:”#fff”,fontWeight:“bold”,fontSize:14,marginTop:2}}>{award.name}</div></div>;
}

// ── Weight Chart ──
function WeightChart({logs,goalWeight,color}){
if(!logs||logs.length<2) return null;
const W=300,H=120,PL=38,PR=20,PT=14,PB=24;
const ws=logs.map(l=>l.weight);
const all=goalWeight?[…ws,Number(goalWeight)]:ws;
const mn=Math.min(…all)-1,mx=Math.max(…all)+1;
const xS=i=>PL+(i/(logs.length-1))*(W-PL-PR);
const yS=w=>PT+(1-(w-mn)/(mx-mn))*(H-PT-PB);
const pts=logs.map((l,i)=>({x:xS(i),y:yS(l.weight),w:l.weight,d:l.date}));
const path=pts.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(” “);
return(
<svg width=“100%” viewBox={`0 0 ${W} ${H}`} style={{display:“block”,overflow:“visible”}}>

// ── Weight Tab ──
function WeightTab({profile,theme,updateProfile}){
const [nw,setNw]=useState(””); const [nd,setNd]=useState(new Date().toISOString().split(“T”)[0]); const [msg,setMsg]=useState(””);
const t=theme; const logs=profile.weightLog||[];
const sw=profile.startWeight?Number(profile.startWeight):null; const gw=profile.goalWeight?Number(profile.goalWeight):null;
const latest=logs.length?logs[logs.length-1].weight:sw;
const lost=logs.length&&sw?Math.max(0,sw-logs[logs.length-1].weight).toFixed(1):0;
const toGo=gw&&latest?Math.max(0,latest-gw).toFixed(1):null;
const prog=sw&&gw&&latest?Math.min(100,Math.round(((sw-latest)/(sw-gw))*100)):0;
const add=()=>{
const w=parseFloat(nw);
if(isNaN(w)||w<50||w>600){setMsg(“Enter a valid weight.”);return;}
const label=new Date(nd+“T12:00:00”).toLocaleDateString(“en-US”,{month:“short”,day:“numeric”,year:“numeric”});
updateProfile(p=>{const idx=(p.weightLog||[]).findIndex(e=>e.date===label);if(idx>=0)p.weightLog[idx]={date:label,weight:w};else p.weightLog=[…(p.weightLog||[]),{date:label,weight:w}].sort((a,b)=>new Date(a.date)-new Date(b.date));});
setNw(””);setMsg(“✅ Logged!”);setTimeout(()=>setMsg(””),2000);
};
return(
<div style={{padding:“12px 14px 16px”}}>
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr 1fr”,gap:8,marginBottom:12}}>
{[{l:“Current”,v:latest?`${latest} lbs`:”—”,i:“⚖️”},{l:“Lost”,v:`${lost} lbs`,i:“📉”},{l:“To Goal”,v:toGo!==null?`${toGo} lbs`:”—”,i:“🎯”}].map((s,i)=>(
<div key={i} style={{background:”#fff”,borderRadius:11,padding:“11px 6px”,textAlign:“center”}}>
<div style={{fontSize:18}}>{s.i}</div><div style={{fontSize:14,fontWeight:“bold”,color:t.bg,marginTop:2}}>{s.v}</div><div style={{fontSize:10,color:”#bbb”,marginTop:1}}>{s.l}</div>
</div>
))}
</div>
{sw&&gw&&(
<div style={{background:”#fff”,borderRadius:13,padding:“13px 14px”,marginBottom:12}}>
<div style={{display:“flex”,justifyContent:“space-between”,fontSize:11,color:”#888”,marginBottom:7}}><span>Start: {sw} lbs</span><span style={{color:”#F5A623”,fontWeight:“bold”}}>{prog}% to goal</span><span>Goal: {gw} lbs</span></div>
<div style={{height:10,background:”#f0f0f0”,borderRadius:5,overflow:“hidden”}}><div style={{height:“100%”,width:`${prog}%`,background:`linear-gradient(90deg,${t.bg},#F5A623)`,borderRadius:5,transition:“width 0.4s”}}/></div>
{prog>=100&&<div style={{textAlign:“center”,marginTop:10,color:”#F5A623”,fontWeight:“bold”,fontSize:13}}>🌟 Goal Reached! Amazing work!</div>}
</div>
)}
{logs.length>=2&&(
<div style={{background:”#fff”,borderRadius:13,padding:“13px 14px”,marginBottom:12}}>
<div style={{fontWeight:“bold”,fontSize:11,color:”#999”,textTransform:“uppercase”,letterSpacing:1,marginBottom:10}}>Weight Progress</div>
<WeightChart logs={logs} goalWeight={gw} color={t.bg}/>
</div>
)}
<div style={{background:”#fff”,borderRadius:13,padding:“13px 14px”,marginBottom:12}}>
<div style={{fontWeight:“bold”,fontSize:11,color:”#999”,textTransform:“uppercase”,letterSpacing:1,marginBottom:10}}>Log Weight</div>
<div style={{display:“flex”,gap:8,marginBottom:8}}>
<input type=“number” value={nw} onChange={e=>setNw(e.target.value)} placeholder=“e.g. 187.5 lbs” style={{flex:1,padding:“10px 11px”,borderRadius:9,border:“1.5px solid #eee”,fontSize:13,outline:“none”}}/>
<input type=“date” value={nd} onChange={e=>setNd(e.target.value)} style={{flex:1,padding:“10px 8px”,borderRadius:9,border:“1.5px solid #eee”,fontSize:12,outline:“none”}}/>
</div>
{msg&&<div style={{fontSize:12,color:msg.startsWith(“✅”)?”#2D5A27”:”#C0392B”,marginBottom:7,textAlign:“center”}}>{msg}</div>}
<button onClick={add} style={{width:“100%”,padding:“11px”,background:t.bg,color:”#fff”,border:“none”,borderRadius:10,fontSize:13,fontWeight:“bold”,cursor:“pointer”}}>+ Log Weight</button>
</div>
{logs.length>0&&(
<div>
<div style={{fontSize:11,fontWeight:“bold”,color:”#bbb”,letterSpacing:1,textTransform:“uppercase”,marginBottom:9}}>Weight History</div>
{[…logs].reverse().map((e,i)=>{
const prev=logs[logs.length-2-i]; const diff=prev?Number((e.weight-prev.weight).toFixed(1)):null;
return(
<div key={i} style={{background:”#fff”,borderRadius:11,padding:“10px 14px”,display:“flex”,alignItems:“center”,justifyContent:“space-between”,marginBottom:5}}>
<div style={{fontWeight:“bold”,fontSize:13}}>{e.date}</div>
<div style={{display:“flex”,alignItems:“center”,gap:10}}>
{diff!==null&&<div style={{fontSize:11,color:diff<0?”#2D5A27”:diff>0?”#C0392B”:”#bbb”,fontWeight:“bold”}}>{diff<0?“▼ “+Math.abs(diff):diff>0?“▲ “+diff:”—”}</div>}
<div style={{fontWeight:“bold”,fontSize:15,color:t.bg}}>{e.weight} lbs</div>
</div>
</div>
);
})}
</div>
)}
</div>
);
}

))}
</div>
<button onClick={addM} disabled={!fn.trim()} style={{width:“100%”,padding:“11px”,background:fn.trim()?t.bg:”#eee”,color:fn.trim()?”#fff”:”#bbb”,border:“none”,borderRadius:10,fontSize:13,fontWeight:“bold”,cursor:fn.trim()?“pointer”:“default”}}>+ Add to {mt}</button>
</div>
{allDays.filter(d=>d!==dl).length>0&&(
<div>
<div style={{fontSize:11,fontWeight:“bold”,color:”#bbb”,letterSpacing:1,textTransform:“uppercase”,marginBottom:9}}>Past Days</div>
{allDays.filter(d=>d!==dl).slice(0,7).map(d=>{
const ms=ml[d]||[]; const tot=ms.reduce((a,m)=>({cal:a.cal+(m.cal||0),pro:a.pro+(m.pro||0),carb:a.carb+(m.carb||0),fat:a.fat+(m.fat||0)}),{cal:0,pro:0,carb:0,fat:0}); const open=expD===d;
return(
<div key={d} style={{background:”#fff”,borderRadius:11,marginBottom:7,overflow:“hidden”}}>
<div onClick={()=>setExpD(open?null:d)} style={{padding:“11px 14px”,display:“flex”,alignItems:“center”,justifyContent:“space-between”,cursor:“pointer”}}>
<div><div style={{fontWeight:“bold”,fontSize:13}}>{d}</div><div style={{fontSize:10,color:”#bbb”,marginTop:1}}>P:{Math.round(tot.pro)}g · C:{Math.round(tot.carb)}g · F:{Math.round(tot.fat)}g</div></div>
<div style={{display:“flex”,alignItems:“center”,gap:8}}><div style={{fontWeight:“bold”,color:t.bg,fontSize:13}}>{tot.cal} kcal</div><div style={{color:”#ccc”}}>{open?“▲”:“▼”}</div></div>
</div>
{open&&ms.map(m=><div key={m.id} style={{padding:“7px 14px”,borderTop:“1px solid #f8f8f8”,display:“flex”,justifyContent:“space-between”,alignItems:“center”}}><div><div style={{fontSize:12}}>{m.name}</div><div style={{fontSize:10,color:”#bbb”}}>{m.type}</div></div><div style={{fontWeight:“bold”,color:t.bg,fontSize:12}}>{m.cal} kcal</div></div>)}
</div>
);
})}
</div>
)}
</div>
);
}

// ── History Tab ──
function HistoryTab({profile,theme}){
const t=theme; const entries=Object.entries(profile.completedDays||{}).sort((a,b)=>new Date(b[0])-new Date(a[0]));
const pc={1:”#8B2E2E”,2:”#2D5A27”,3:”#1A2C5B”}; const wk=weekKey(new Date()); const tw=(profile.weekLog||{})[wk]||[];
return(
<div style={{padding:“12px 14px 16px”}}>
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr 1fr 1fr”,gap:7,marginBottom:12}}>
{[{l:“Points”,v:(profile.points||0).toLocaleString(),i:“⭐”},{l:“Workouts”,v:profile.workoutsCompleted||0,i:“🏋️”},{l:“Full Wks”,v:profile.fullWeeksCompleted||0,i:“📅”},{l:“Awards”,v:(profile.awards||[]).length,i:“🏅”}].map((s,i)=>(
<div key={i} style={{background:”#fff”,borderRadius:11,padding:“10px 5px”,textAlign:“center”}}>
<div style={{fontSize:17}}>{s.i}</div><div style={{fontSize:15,fontWeight:“bold”,color:t.bg}}>{s.v}</div><div style={{fontSize:9,color:”#bbb”,marginTop:1}}>{s.l}</div>
</div>
))}
</div>
<div style={{background:”#fff”,borderRadius:13,padding:“12px 14px”,marginBottom:12}}>
<div style={{fontWeight:“bold”,fontSize:11,marginBottom:9,color:”#999”,textTransform:“uppercase”,letterSpacing:1}}>This Week — {tw.length}/7</div>
<div style={{display:“flex”,gap:4}}>
{DAYS.map(d=>{const dn=tw.includes(d);return <div key={d} style={{flex:1,textAlign:“center”}}><div style={{fontSize:9,color:”#ccc”,marginBottom:3}}>{d}</div><div style={{height:26,borderRadius:7,background:dn?t.bg:”#f5f5f5”,display:“flex”,alignItems:“center”,justifyContent:“center”,color:dn?”#fff”:”#ddd”,fontSize:12}}>{dn?“✓”:”·”}</div></div>;})}
</div>
{tw.length===7&&<div style={{marginTop:9,textAlign:“center”,color:”#F5A623”,fontWeight:“bold”,fontSize:12}}>🔥 Perfect Week! +{PTS_WK} pts earned</div>}
{tw.length>0&&tw.length<7&&<div style={{marginTop:7,textAlign:“center”,color:”#bbb”,fontSize:11}}>{7-tw.length} more day{7-tw.length!==1?“s”:””} for the +{PTS_WK} bonus!</div>}
</div>
<div style={{fontSize:11,fontWeight:“bold”,color:”#bbb”,letterSpacing:1,textTransform:“uppercase”,marginBottom:9}}>Workout Log</div>
{entries.length===0?<div style={{textAlign:“center”,padding:“28px 20px”,color:”#ccc”}}><div style={{fontSize:34,marginBottom:9}}>📋</div><div>No workouts logged yet.</div></div>
:<div style={{display:“flex”,flexDirection:“column”,gap:6}}>{entries.map(([date,info])=>(
<div key={date} style={{background:”#fff”,borderRadius:11,padding:“11px 14px”,display:“flex”,alignItems:“center”,gap:10,borderLeft:`4px solid ${pc[info.phase]||t.bg}`}}>
<div style={{flex:1}}><div style={{fontWeight:“bold”,fontSize:13}}>{date}</div><div style={{fontSize:11,color:”#aaa”,marginTop:1}}>{DAY_FULL[info.day]||info.day} · {info.label} · {info.exercises} exercises</div></div>
<div style={{background:`${pc[info.phase]}15`,color:pc[info.phase],fontSize:10,fontWeight:“bold”,padding:“3px 7px”,borderRadius:5,textTransform:“uppercase”}}>P{info.phase}</div>
</div>
))}</div>
}
</div>
);
}

// ── Awards Tab ──
function AwardsTab({profile,theme}){
const t=theme; const earned=profile.awards||[];
return(
<div style={{padding:“12px 14px 16px”}}>
<div style={{fontSize:11,fontWeight:“bold”,color:”#bbb”,letterSpacing:1,textTransform:“uppercase”,marginBottom:12}}>{earned.length} / {AWARDS.length} Awards Earned</div>
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr”,gap:9}}>
{AWARDS.map(a=>{const have=earned.includes(a.id);return(
<div key={a.id} style={{background:have?”#fff”:”#f8f8f8”,borderRadius:13,padding:“13px 11px”,textAlign:“center”,border:have?`2px solid ${t.bg}`:“2px solid transparent”,opacity:have?1:0.45}}>
<div style={{fontSize:28,marginBottom:5,filter:have?“none”:“grayscale(1)”}}>{a.icon}</div>
<div style={{fontWeight:“bold”,fontSize:12,color:have?”#1a1a1a”:”#aaa”}}>{a.name}</div>
<div style={{fontSize:10,color:”#bbb”,marginTop:3,lineHeight:1.4}}>{a.desc}</div>
{have&&<div style={{marginTop:6,background:`${t.bg}18`,color:t.bg,fontSize:10,fontWeight:“bold”,padding:“2px 8px”,borderRadius:18,display:“inline-block”}}>✓ Earned</div>}
</div>
);})}
</div>
</div>
);
}

ReactDOM.createRoot(document.getElementById(‘root’)).render(<App/>);
</script>

</body>
</html>
